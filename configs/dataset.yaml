runtime:
  device: cuda

paths:
  dataset: ../datasets/dataset.pt

n_events: 100000

# Synthetic toy modelled in PRE-SIGMOID score space (sigmoid_y: false). The score
# systematic + the data<->simulation distortion are applied to the pre-sigmoid
# Gaussian score; with the sigmoid off, that unbounded space IS the observable, so
# the systematic is a clean location/scale matched to the residual's y*exp(s)+t form
# (no logit/edge pile-up). Apply the sigmoid to SAMPLES at plot time for presentation;
# inference is unchanged up to a fixed, nu-independent Jacobian.

# Nominal reference: no systematic pulls, no distortion.
generator:
  center_A: [-0.5, 0.0]
  center_B: [+0.5, 0.0]
  sigma_A:  [0.9, 0.6]
  sigma_B:  [0.6, 0.4]
  variation_shift:   0.0
  variation_squeeze: 0.0
  shift_scale:   1
  shift_dir:     [1.0, 0.0]
  squeeze_scale: 1
  y_shift_scale:   0.0
  y_squeeze_scale: 0.0
  distortion_strength: 0.0
  distortion_shift_scale:   0.0
  distortion_squeeze_scale: 0.0
  sigmoid_y: false

# Distorted "data": y-distortion + injected x-systematics + the score-space
# systematic. y_shift/squeeze_scale set the explicit p(y|x,nu) load (owned by
# residual_score in step-1); the distortion map is the data<->simulation transfer T
# that ONLY residual_transfer can absorb (step-1 templates are undistorted) — this
# breaks the score/transfer degeneracy so step-2 profiling has a genuine effect to learn.
generator_data:
  center_A: [-0.5, 0.0]
  center_B: [+0.5, 0.0]
  sigma_A:  [0.9, 0.6]
  sigma_B:  [0.6, 0.4]
  variation_shift:   0.5   # injected nu_shift truth
  variation_squeeze: -0.5  # injected nu_squeeze truth
  shift_scale:   0.3
  shift_dir:     [1.0, 0.0]
  squeeze_scale: 0.2
  y_shift_scale:   0.3     # score-mean load from nu_shift    (linear)
  y_squeeze_scale: 0.2     # score-spread load from nu_squeeze (exp)
  distortion_strength: 0.2
  distortion_shift_scale:   0.0
  distortion_squeeze_scale: 0.0
  sigmoid_y: false
